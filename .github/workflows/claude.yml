name: Claude Code Review

# Triggers when someone mentions @claude in a PR comment, a PR review comment,
# a PR review, or the PR/issue body. Tagging @claude on a pull request kicks off
# a code review against this repo's standards (see CLAUDE.md and .claude/rules/).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when @claude is actually mentioned, and (for issue_comment) only
    # on pull requests — not plain issues.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          # Authentication — set ONE of these as a repository secret:
          #   ANTHROPIC_API_KEY        (Anthropic API key), or
          #   CLAUDE_CODE_OAUTH_TOKEN  (Claude Pro/Max subscription token).
          # Comment out the line you are not using.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # When @claude is tagged on a PR, perform a code review. The repo's
          # CLAUDE.md and .claude/rules/ are loaded automatically and define the
          # review standards (coverage gates, security, Spring Boot 2.6 / javax,
          # YugabyteDB query safety, etc.). If the comment includes specific
          # instructions, follow those in addition.
          prompt: |
            A reviewer tagged @claude on this pull request. Review the changes in
            this PR for correctness, security, maintainability, and adherence to
            the standards in CLAUDE.md and .claude/rules/. Post your findings as a
            PR review with inline comments where useful, each with a short
            rationale and a confidence level. If the triggering comment includes
            specific requests, address those as well.
