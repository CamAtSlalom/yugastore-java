name: Claude Code

# Two ways Claude reviews PRs here:
#   1. claude-mention      — someone tags @claude on a PR/issue (interactive).
#   2. claude-auto-review  — every newly opened/reopened PR is reviewed automatically.
#
# Auth: this uses the built-in GITHUB_TOKEN (github_token below) so it works
# WITHOUT installing the Claude GitHub App. If the app is later installed on the
# repo (needs repo admin: https://github.com/apps/claude), you can drop the
# github_token line to post as claude[bot] instead of github-actions[bot].
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, reopened]

jobs:
  # ── Interactive: respond when @claude is tagged on a PR/issue ──────────────
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A reviewer tagged @claude on this pull request. Review the changes in
            this PR for correctness, security, maintainability, and adherence to
            the standards in CLAUDE.md and .claude/rules/. Post your findings as a
            PR review with inline comments where useful, each with a short
            rationale and a confidence level. If the triggering comment includes
            specific requests, address those as well.

  # ── Automated: review every newly opened / reopened PR ─────────────────────
  claude-auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}
            ("${{ github.event.pull_request.title }}") for correctness, security,
            maintainability, and adherence to the standards in CLAUDE.md and
            .claude/rules/. Pay particular attention to Spring Boot 2.6 / javax
            conventions, parameterized YCQL/YSQL queries, and the coverage and
            security gates. Post your findings as a PR review with inline comments
            where useful, each with a short rationale and a confidence level.
            If the PR looks good, say so briefly rather than inventing issues.
